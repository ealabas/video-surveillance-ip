# Video Surveillance over IP - NGINX Configuration

worker_processes 1;

events {
    worker_connections 128;
}

http {
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js;
        application/dash+xml                  mpd;
        video/iso.segment                     m4s;
        video/mp4                             mp4;
        image/png                             png;
        image/jpeg                            jpg jpeg;
    }

    server {
        listen 9090;
        server_name localhost;

        # Serve the HTML5 player page
        location / {
            root "C:/Users/GameG/Documents/GitHub/video-surveillance-ip/client";
            index index.html;
        }

        # Serve DASH segments - note the trailing slash on both location and alias
        location /dash_output/ {
            alias "C:/Users/GameG/Documents/GitHub/video-surveillance-ip/server/dash_output/";

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Cache-Control "no-cache" always;
        }
    }
}